<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>필름로드 · 페이지 전체 보기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  body { margin: 0; font-family: 'Pretendard', system-ui, sans-serif; }
  iframe { border: 0; display: block; width: 390px; height: 844px; background: white; border-radius: 40px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
  /* Make iframes feel like phone mockups */
  .pg-card {
    background: white; border-radius: 44px; padding: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 20px 40px rgba(0,0,0,.08);
  }
  .pg-card iframe { border-radius: 36px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  const frame = (src) => (
    <div className="pg-card">
      <iframe src={src} />
    </div>
  );

  const App = () => (
    <DesignCanvas>
      <DCSection id="entry" title="진입 & 탐색" subtitle="앱을 켜고 성지를 찾는 여정">
        <DCArtboard id="onboard" label="12 · 온보딩 / 로그인" width={406} height={860}>{frame('pages/12-onboarding.html')}</DCArtboard>
        <DCArtboard id="home" label="01 · 홈" width={406} height={860}>{frame('pages/01-home.html')}</DCArtboard>
        <DCArtboard id="map" label="02 · 지도" width={406} height={860}>{frame('pages/02-map.html')}</DCArtboard>
        <DCArtboard id="saved" label="11 · 저장한 장소" width={406} height={860}>{frame('pages/11-saved.html')}</DCArtboard>
      </DCSection>

      <DCSection id="place" title="성지 & 작품" subtitle="장소 · 작품 상세 · 갤러리">
        <DCArtboard id="place-detail" label="03 · 장소 상세" width={406} height={860}>{frame('pages/03-place-detail.html')}</DCArtboard>
        <DCArtboard id="gallery" label="10 · 장소별 갤러리" width={406} height={860}>{frame('pages/10-gallery.html')}</DCArtboard>
        <DCArtboard id="work-detail" label="09 · 작품 상세" width={406} height={860}>{frame('pages/09-work-detail.html')}</DCArtboard>
      </DCSection>

      <DCSection id="capture" title="인증 플로우" subtitle="카메라 → 업로드 → 리워드">
        <DCArtboard id="camera" label="04 · 카메라 (AR 오버레이)" width={406} height={860}>{frame('pages/04-camera.html')}</DCArtboard>
        <DCArtboard id="upload" label="05 · 업로드 / 포스팅" width={406} height={860}>{frame('pages/05-upload.html')}</DCArtboard>
        <DCArtboard id="reward" label="06 · 인증 완료 · 리워드" width={406} height={860}>{frame('pages/06-reward.html')}</DCArtboard>
      </DCSection>

      <DCSection id="me" title="내 활동" subtitle="프로필 · 스탬프북">
        <DCArtboard id="profile" label="07 · 내 프로필" width={406} height={860}>{frame('pages/07-profile.html')}</DCArtboard>
        <DCArtboard id="stampbook" label="08 · 스탬프북" width={406} height={860}>{frame('pages/08-stampbook.html')}</DCArtboard>
      </DCSection>

      <DCSection id="sns" title="커뮤니티" subtitle="다른 팬들의 인증샷 탐색">
        <DCArtboard id="feed" label="13 · 탐색 (SNS 피드)" width={406} height={860}>{frame('pages/13-feed.html')}</DCArtboard>
      </DCSection>
    </DesignCanvas>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
