<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390">
<title>02 · 지도</title>
<link rel="stylesheet" href="shared.css?v=7">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .map {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 30% 30%, #e6eef7 0%, transparent 50%),
      radial-gradient(circle at 70% 60%, #dde9f2 0%, transparent 60%),
      linear-gradient(180deg, #eef3f8, #e3ecf4);
  }
  .map::before {
    content:''; position:absolute; inset:0;
    background-image:
      linear-gradient(to right, rgba(0,0,0,.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(0,0,0,.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* road shapes */
  .road { position:absolute; height:14px; border-radius:999px; background:#fff; box-shadow:0 0 0 2px #e1ebf3; }
  .road.v { width:14px; height:auto; }
  /* pins */
  .pin { position:absolute; transform:translate(-50%,-100%); cursor:pointer; z-index:2; }
  .pin .bubble {
    background:white; border-radius:999px; padding: 5px 10px 5px 5px;
    display:flex; align-items:center; gap:6px;
    box-shadow: 0 6px 18px rgba(15,23,42,.2), 0 0 0 1px rgba(15,23,42,.06);
    font-size:11px; font-weight:700; color:var(--fr-ink); letter-spacing:-0.02em;
  }
  .pin .dot { width:22px; height:22px; border-radius:50%; background:var(--fr-primary); color:white; display:flex; align-items:center; justify-content:center; }
  .pin .bubble::after {
    content:''; position:absolute; left:50%; bottom:-5px; transform:translateX(-50%) rotate(45deg);
    width:8px; height:8px; background:white; box-shadow: 1px 1px 0 rgba(15,23,42,.06);
  }
  .pin.active { z-index:5; }
  .pin.active .dot { background:#0f172a; transform:scale(1.1); }
  .pin.active .bubble { background:#0f172a; color:white; }
  .pin.active .bubble::after { background:#0f172a; }
  .pin.visited .dot { background:var(--fr-mint); }

  .me {
    position:absolute; left:50%; top:52%; transform:translate(-50%,-50%);
    width: 18px; height:18px; border-radius:50%; background:var(--fr-primary); border:3px solid white;
    box-shadow: 0 0 0 8px rgba(20,188,237,.25); z-index:3;
  }

  .top-bar {
    position:absolute; top:44px; left:16px; right:16px; z-index:20;
    display:flex; gap:8px;
  }
  .search-box {
    flex:1; height:48px; background:white; border-radius:16px;
    display:flex; align-items:center; padding: 0 16px; gap:10px;
    box-shadow: 0 8px 24px rgba(15,23,42,.08), 0 0 0 1px rgba(15,23,42,.04);
    font-size:14px; color:var(--fr-ink-3);
  }
  .icon-btn {
    width:48px; height:48px; background:white; border-radius:16px;
    display:flex; align-items:center; justify-content:center; color:var(--fr-ink);
    box-shadow: 0 8px 24px rgba(15,23,42,.08), 0 0 0 1px rgba(15,23,42,.04);
  }
  .chip-row {
    position:absolute; top:102px; left:0; right:0; z-index:20;
    display:flex; gap:8px; padding: 0 16px; overflow-x:auto;
  }
  .filter-chip {
    white-space:nowrap; background:white; border-radius:999px; padding:8px 14px;
    font-size:12px; font-weight:700; color:var(--fr-ink);
    box-shadow: 0 4px 12px rgba(15,23,42,.06), 0 0 0 1px rgba(15,23,42,.04);
    display:flex; align-items:center; gap:5px;
  }
  .filter-chip.on { background: var(--fr-ink); color:white; }
  .zoom {
    position:absolute; right:16px; bottom:280px; z-index:20;
    display:flex; flex-direction:column; background:white; border-radius:14px;
    box-shadow: 0 8px 24px rgba(15,23,42,.08), 0 0 0 1px rgba(15,23,42,.04);
    overflow:hidden;
  }
  .zoom button { width:44px; height:44px; background:white; border:none; color:var(--fr-ink); display:flex; align-items:center; justify-content:center; }
  .zoom button + button { border-top:1px solid var(--fr-line); }
  .locate {
    position:absolute; right:16px; bottom:220px; z-index:20;
    width:48px; height:48px; border-radius:14px; background:white; color:var(--fr-primary);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 8px 24px rgba(15,23,42,.08), 0 0 0 1px rgba(15,23,42,.04);
  }
  .sheet {
    position:absolute; left:0; right:0; bottom:84px; z-index:25;
    background:white; border-radius:22px 22px 0 0;
    box-shadow: 0 -10px 40px rgba(15,23,42,.12);
    padding: 10px 20px 16px;
  }
  .sheet .handle { width:38px; height:5px; background:#e2e8f0; border-radius:3px; margin: 0 auto 12px; }
  .sheet .title-row { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:12px; }
  .sheet .t1 { font-size:17px; font-weight:800; letter-spacing:-0.02em; }
  .sheet .t2 { font-size:12px; color:var(--fr-ink-3); margin-top:2px; }
  .sheet-preview { display:flex; gap:10px; }
  .sheet-thumb { width:74px; height:74px; border-radius:14px; overflow:hidden; flex-shrink:0; }
  .sheet-thumb img { width:100%; height:100%; object-fit:cover; }
  .sheet-meta { flex:1; display:flex; flex-direction:column; justify-content:space-between; }
  .stat-row { display:flex; gap:14px; font-size:11px; color:var(--fr-ink-3); }
  .stat-row .s { display:flex; align-items:center; gap:3px; }
  .go-btn { height:38px; border-radius:11px; background:var(--fr-primary); color:white; font-weight:700; font-size:13px; border:none; display:flex; align-items:center; justify-content:center; gap:6px; padding: 0 14px; }
</style>
</head>
<body class="fr-frame">
<div class="fr-page" style="position:relative;">
  <div class="fr-status" style="position:absolute; top:0; left:0; right:0;">
    <span>9:41</span>
    <span class="right"><i data-lucide="signal" class="ic-16"></i><i data-lucide="wifi" class="ic-16"></i><i data-lucide="battery-full" class="ic-20"></i></span>
  </div>

  <div class="map">
    <!-- mock roads -->
    <div class="road" style="top:180px; left:-20px; width:320px; transform:rotate(-8deg);"></div>
    <div class="road" style="top:320px; left:40px; width:380px; transform:rotate(4deg);"></div>
    <div class="road" style="top:480px; left:-30px; width:440px; transform:rotate(-2deg);"></div>
    <div class="road v" style="top:120px; left:160px; height:560px;"></div>
    <div class="road v" style="top:200px; left:280px; height:480px; transform:rotate(6deg);"></div>
    <!-- park blob -->
    <div style="position:absolute; top:220px; left:40px; width:110px; height:90px; background:#cfe3cf; border-radius: 60% 40% 50% 50%; opacity:.7;"></div>
    <!-- water -->
    <div style="position:absolute; top:560px; left:-20px; right:-20px; height:280px; background:linear-gradient(180deg, #d5e6f1, #c0d7e6);"></div>

    <div class="me"></div>

    <div class="pin visited" style="left:28%; top:40%;"><div class="bubble"><span class="dot"><i data-lucide="check" class="ic-16"></i></span>영진해변</div></div>
    <div class="pin active" style="left:52%; top:50%;"><div class="bubble"><span class="dot"><i data-lucide="camera" class="ic-16"></i></span>주문진 방파제</div></div>
    <div class="pin" style="left:72%; top:36%;"><div class="bubble"><span class="dot"><i data-lucide="camera" class="ic-16"></i></span>강릉커피거리</div></div>
    <div class="pin" style="left:40%; top:64%;"><div class="bubble"><span class="dot"><i data-lucide="camera" class="ic-16"></i></span>안목해변</div></div>
    <div class="pin" style="left:78%; top:60%;"><div class="bubble"><span class="dot"><i data-lucide="camera" class="ic-16"></i></span>경포대</div></div>
  </div>

  <div class="top-bar">
    <div class="search-box">
      <i data-lucide="search" class="ic-18" style="color:var(--fr-ink-4)"></i>
      <span>강릉 · 도깨비 촬영지</span>
    </div>
    <div class="icon-btn"><i data-lucide="sliders-horizontal" class="ic-20"></i></div>
  </div>
  <div class="chip-row no-scrollbar">
    <div class="filter-chip on"><i data-lucide="map-pin" class="ic-16"></i>성지</div>
    <div class="filter-chip"><i data-lucide="check" class="ic-16"></i>방문완료</div>
    <div class="filter-chip"><i data-lucide="users" class="ic-16"></i>친구 방문</div>
    <div class="filter-chip"><i data-lucide="film" class="ic-16"></i>도깨비</div>
    <div class="filter-chip"><i data-lucide="users" class="ic-16"></i>친구</div>
  </div>

  <div class="locate"><i data-lucide="locate-fixed" class="ic-22"></i></div>
  <div class="zoom">
    <button><i data-lucide="plus" class="ic-18"></i></button>
    <button><i data-lucide="minus" class="ic-18"></i></button>
  </div>

  <div class="sheet">
    <div class="handle"></div>
    <div class="title-row">
      <div>
        <span class="fr-chip fr-chip-soft" style="margin-bottom:6px;">도깨비 · 1회</span>
        <div class="t1">주문진 영진해변 방파제</div>
        <div class="t2">강릉시 주문진읍 영진리 · 1.2km</div>
      </div>
      <div style="width:36px; height:36px; border-radius:12px; background:var(--fr-bg-muted); display:flex; align-items:center; justify-content:center;"><i data-lucide="bookmark" class="ic-18" style="color:var(--fr-ink-3)"></i></div>
    </div>
    <div class="sheet-preview">
      <div class="sheet-thumb"><img src="https://images.unsplash.com/photo-1520626337972-005d3cdb8978?auto=format&fit=crop&w=300&q=80"></div>
      <div class="sheet-meta">
        <div class="stat-row">
          <span class="s"><i data-lucide="camera" class="ic-16"></i>1,204</span>
          <span class="s"><i data-lucide="heart" class="ic-16"></i>3.2k</span>
          <span class="s"><i data-lucide="star" class="ic-16" style="color:var(--fr-amber); fill:var(--fr-amber)"></i>4.8</span>
        </div>
        <button class="go-btn">인증하러 가기 <i data-lucide="arrow-right" class="ic-16"></i></button>
      </div>
    </div>
  </div>

  <nav class="fr-nav">
    <div class="fr-nav-row">
      <div class="fr-nav-item"><i data-lucide="home" class="ic-24"></i><span class="lbl">홈</span></div>
      <div class="fr-nav-item is-active"><i data-lucide="map" class="ic-24"></i><span class="lbl">지도</span></div>
      <div class="fr-nav-cta"><i data-lucide="camera" class="ic-24"></i></div>
      <div class="fr-nav-item"><i data-lucide="search" class="ic-24"></i><span class="lbl">탐색</span></div>
      <div class="fr-nav-item"><i data-lucide="user" class="ic-24"></i><span class="lbl">나</span></div>
    </div>
  </nav>
  <div class="fr-home-indicator"></div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
