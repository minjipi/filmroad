<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390">
<title>03 · 장소 상세</title>
<link rel="stylesheet" href="shared.css?v=7">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .hero { position:relative; width:100%; height:440px; background:#000; }
  .hero img { width:100%; height:100%; object-fit:cover; }
  .hero-grad { position:absolute; inset:0; background: linear-gradient(to bottom, rgba(0,0,0,.4) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 55%, rgba(0,0,0,.85) 100%); }
  .hero-top { position:absolute; top:44px; left:0; right:0; padding: 10px 16px; display:flex; justify-content:space-between; align-items:center; z-index:5; }
  .round-btn { width:40px; height:40px; border-radius:50%; background:rgba(0,0,0,.35); backdrop-filter:blur(10px); color:white; display:flex; align-items:center; justify-content:center; border:none; }
  .hero-caption { position:absolute; left:20px; right:20px; bottom:44px; color:white; z-index:4; }
  .hero-caption h1 { font-size:26px; font-weight:800; letter-spacing:-0.03em; margin: 10px 0 6px; }
  .hero-caption .loc { display:flex; align-items:center; gap:5px; font-size:13px; opacity:.9; }
  .scene-compare {
    position:absolute; right:18px; bottom:44px; z-index:5;
    width:96px; height:140px; border-radius:14px; overflow:hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
    border: 3px solid white;
  }
  .scene-compare img { width:100%; height:100%; object-fit:cover; }
  .scene-compare .lbl { position:absolute; top:6px; left:6px; background:rgba(0,0,0,.7); color:white; font-size:9px; font-weight:700; padding:3px 7px; border-radius:999px; }

  .sheet {
    background:white; border-radius: 28px 28px 0 0; margin-top:-28px; position:relative; z-index:3;
    padding: 18px 20px 0;
  }
  .info-row { display:flex; justify-content:space-between; gap:16px; padding-bottom:20px; border-bottom:1px solid var(--fr-line); }
  .info-chips { display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
  .action-col { display:flex; gap:8px; }
  .act { width:44px; height:44px; border-radius:14px; background:var(--fr-bg-muted); color:var(--fr-ink-2); display:flex; align-items:center; justify-content:center; border:none; }
  .act.like.on { background:#fff1f2; color:var(--fr-coral); }

  .section { padding: 22px 0; border-bottom:1px solid var(--fr-line); }
  .section h2 { font-size:17px; font-weight:800; margin: 0 0 10px; letter-spacing:-0.02em; }
  .section p.body { font-size:14px; color:var(--fr-ink-2); line-height:1.55; }
  .stat-bar { display:flex; gap:10px; margin-bottom:12px; }
  .stat-chip { flex:1; background:var(--fr-bg-muted); border-radius:14px; padding:12px; text-align:center; }
  .stat-chip .n { font-weight:800; font-size:17px; letter-spacing:-0.02em; }
  .stat-chip .l { font-size:10.5px; color:var(--fr-ink-3); margin-top:2px; }
  .cta-row { display:flex; gap:10px; padding: 20px 0 110px; }
  .gallery { display:grid; grid-template-columns: repeat(3, 1fr); gap:6px; }
  .gallery .cell { aspect-ratio:1; border-radius:10px; overflow:hidden; background:#eef2f6; }
  .gallery .cell img { width:100%; height:100%; object-fit:cover; }
  .gallery .cell.more { background:rgba(15,23,42,.8); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; }
  .related { display:flex; gap:10px; overflow-x:auto; margin: 0 -20px; padding: 0 20px; }
  .rel-card { flex-shrink:0; width:140px; }
  .rel-card .thumb { width:140px; height:140px; border-radius:14px; overflow:hidden; margin-bottom:8px; }
  .rel-card .thumb img { width:100%; height:100%; object-fit:cover; }
  .rel-card .t { font-size:12.5px; font-weight:700; letter-spacing:-0.02em; line-height:1.3; }
  .rel-card .s { font-size:11px; color:var(--fr-ink-3); margin-top:2px; }
</style>
</head>
<body class="fr-frame" style="overflow-y:auto;">
<div class="fr-page" style="height:auto; min-height:100%;">
  <div class="hero">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1000&q=80">
    <div class="hero-grad"></div>
    <div class="fr-status" style="position:absolute; top:0; left:0; right:0; color:white; z-index:6;">
      <span>9:41</span>
      <span class="right"><i data-lucide="signal" class="ic-16"></i><i data-lucide="wifi" class="ic-16"></i><i data-lucide="battery-full" class="ic-20"></i></span>
    </div>
    <div class="hero-top">
      <button class="round-btn"><i data-lucide="chevron-left" class="ic-22"></i></button>
      <div style="display:flex; gap:8px;">
        <button class="round-btn"><i data-lucide="share-2" class="ic-20"></i></button>
        <button class="round-btn"><i data-lucide="more-horizontal" class="ic-20"></i></button>
      </div>
    </div>
    <div class="hero-caption">
      <div style="display:flex; gap:6px;">
        <span class="fr-chip fr-chip-primary">도깨비</span>
        <span class="fr-chip fr-chip-ghost">1회 · 00:15:24</span>
      </div>
      <h1>주문진 영진해변 방파제</h1>
      <div class="loc"><i data-lucide="map-pin" class="ic-16"></i>강릉시 주문진읍 영진리</div>
    </div>
    <div class="scene-compare">
      <div class="lbl">드라마 장면</div>
      <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=400&q=80">
    </div>
  </div>

  <div class="sheet">
    <div class="info-row">
      <div>
        <div class="info-chips">
          <span style="font-size:12px; color:var(--fr-ink-3); display:inline-flex; align-items:center; gap:4px;"><i data-lucide="navigation" class="ic-16"></i>1.2km</span>
          <span style="width:3px;height:3px;border-radius:50%;background:var(--fr-ink-4);display:inline-block;"></span>
          <span style="font-size:12px; color:var(--fr-ink-3);">차로 12분</span>
        </div>
        <div style="display:flex; align-items:center; gap:4px; margin-top:4px;">
          <i data-lucide="star" class="ic-16" style="color:var(--fr-amber); fill:var(--fr-amber)"></i>
          <strong style="font-size:14px;">4.8</strong>
          <span style="font-size:12px; color:var(--fr-ink-3);">(1,204명)</span>
        </div>
      </div>
      <div class="action-col">
        <button class="act"><i data-lucide="bookmark" class="ic-20"></i></button>
        <button class="act like on"><i data-lucide="heart" class="ic-20" style="fill:currentColor"></i></button>
      </div>
    </div>

    <div class="section">
      <h2>이 장면, 기억나세요?</h2>
      <p class="body">김신이 메밀꽃 다발을 들고 서 있던 운명의 방파제예요. 해 질 무렵이 가장 예쁘고, 메밀꽃은 근처 편의점에서도 살 수 있어요.</p>
      <div class="stat-bar" style="margin-top:14px;">
        <div class="stat-chip"><div class="n">3.2k</div><div class="l">인증샷</div></div>
        <div class="stat-chip"><div class="n">12곳</div><div class="l">주변 맛집</div></div>
        <div class="stat-chip"><div class="n">골든아워</div><div class="l">추천 시간</div></div>
      </div>
      <div style="display:flex; gap:10px; margin-top:16px;">
        <button class="fr-btn fr-btn-ghost" style="flex:1;"><i data-lucide="navigation" class="ic-20"></i>지도 보기</button>
        <button class="fr-btn fr-btn-primary" style="flex:1.6;"><i data-lucide="camera" class="ic-20"></i>인증하기</button>
      </div>
    </div>

    <div class="section">
      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;">
        <h2 style="margin:0;">방문객 인증샷</h2>
        <span style="font-size:12px; color:var(--fr-primary); font-weight:700;">전체 보기</span>
      </div>
      <div class="gallery">
        <div class="cell"><img src="https://images.unsplash.com/photo-1541963463532-d68292c34b19?auto=format&fit=crop&w=300&q=80"></div>
        <div class="cell"><img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=300&q=80"></div>
        <div class="cell"><img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=300&q=80"></div>
        <div class="cell"><img src="https://images.unsplash.com/photo-1519046904884-53103b34b206?auto=format&fit=crop&w=300&q=80"></div>
        <div class="cell"><img src="https://images.unsplash.com/photo-1505144808419-1957a94ca61e?auto=format&fit=crop&w=300&q=80"></div>
        <div class="cell more">+1,199</div>
      </div>
    </div>

    <div class="section">
      <h2>이 작품의 다른 성지</h2>
      <div class="related no-scrollbar">
        <div class="rel-card">
          <div class="thumb"><img src="https://images.unsplash.com/photo-1546874177-9e664107314e?auto=format&fit=crop&w=400&q=80"></div>
          <div class="t">퀘벡 몽모랑시 폭포</div>
          <div class="s">9회 · 캐나다</div>
        </div>
        <div class="rel-card">
          <div class="thumb"><img src="https://images.unsplash.com/photo-1517154421773-0529f29ea451?auto=format&fit=crop&w=400&q=80"></div>
          <div class="t">운평공원 느티나무</div>
          <div class="s">6회 · 부안</div>
        </div>
        <div class="rel-card">
          <div class="thumb"><img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=400&q=80"></div>
          <div class="t">서울식물원</div>
          <div class="s">12회 · 서울</div>
        </div>
      </div>
    </div>

    <div style="padding-bottom:40px;"></div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
