<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390">
<title>04 · 카메라</title>
<link rel="stylesheet" href="shared.css?v=7">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body.fr-frame { background: #0a0a0a; color:white; }
  .cam { position:absolute; inset:0; overflow:hidden; }
  .cam-view { position:absolute; inset:0; background:#111; }
  .cam-view img { width:100%; height:100%; object-fit:cover; }
  .scene-overlay {
    position:absolute; inset:0; opacity:.42; mix-blend-mode:screen;
  }
  .scene-overlay img { width:100%; height:100%; object-fit:cover; }

  /* framing guides */
  .grid-lines {
    position:absolute; inset:80px 0 160px;
    pointer-events:none;
  }
  .grid-lines::before, .grid-lines::after {
    content:''; position:absolute; background: rgba(255,255,255,.25);
  }
  .grid-lines::before { top:33.3%; left:0; right:0; height:1px; }
  .grid-lines::after { top:66.6%; left:0; right:0; height:1px; }
  .grid-v::before, .grid-v::after {
    content:''; position:absolute; background: rgba(255,255,255,.25);
    top:80px; bottom:160px; width:1px;
  }
  .grid-v::before { left:33.3%; }
  .grid-v::after { left:66.6%; }

  .top {
    position:absolute; top:0; left:0; right:0; z-index:10;
    padding: 50px 18px 12px;
    display:flex; justify-content:space-between; align-items:center;
    background: linear-gradient(to bottom, rgba(0,0,0,.6), transparent);
  }
  .top .r-btn { width:38px; height:38px; border-radius:50%; background:rgba(0,0,0,.4); backdrop-filter:blur(10px); color:white; display:flex; align-items:center; justify-content:center; }
  .spot-badge {
    display:flex; align-items:center; gap:8px;
    background:rgba(0,0,0,.55); backdrop-filter:blur(12px);
    padding:6px 12px 6px 6px; border-radius:999px;
  }
  .spot-badge .dot { width:28px; height:28px; border-radius:50%; background:var(--fr-primary); display:flex; align-items:center; justify-content:center; }
  .spot-badge .t { font-size:12px; font-weight:700; }
  .spot-badge .s { font-size:10px; opacity:.7; }

  .guide-card {
    position:absolute; left:16px; right:16px; top:100px; z-index:9;
    background: rgba(20,188,237,.15); backdrop-filter:blur(20px);
    border:1px solid rgba(20,188,237,.3);
    border-radius:16px; padding:12px 14px;
    display:flex; gap:10px; align-items:center;
  }
  .guide-card .ico { width:34px; height:34px; border-radius:10px; background:var(--fr-primary); display:flex; align-items:center; justify-content:center; color:white; flex-shrink:0; }
  .guide-card .txt { font-size:12px; line-height:1.4; }
  .guide-card .txt b { font-size:13px; }

  /* mode tabs */
  .modes {
    position:absolute; left:0; right:0; bottom:188px; z-index:10;
    display:flex; justify-content:center; gap:14px;
  }
  .mode { font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px; color:rgba(255,255,255,.7); }
  .mode.on { background: var(--fr-primary); color:white; }

  /* compare slider */
  .compare-hint {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:5;
    display:flex; flex-direction:column; align-items:center; gap:6px; pointer-events:none;
  }
  .compare-hint .ring { width:64px; height:64px; border:2px dashed rgba(255,255,255,.6); border-radius:50%; display:flex; align-items:center; justify-content:center; }

  /* bottom controls */
  .controls {
    position:absolute; left:0; right:0; bottom:34px; z-index:10;
    padding: 0 24px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .thumb {
    width:48px; height:48px; border-radius:12px; overflow:hidden; border:2px solid white;
  }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  .shutter {
    width:76px; height:76px; border-radius:50%; border:4px solid white;
    display:flex; align-items:center; justify-content:center;
    background:transparent;
  }
  .shutter .inner { width:60px; height:60px; border-radius:50%; background:white; }
  .flip {
    width:48px; height:48px; border-radius:50%; background:rgba(0,0,0,.45); backdrop-filter:blur(10px);
    display:flex; align-items:center; justify-content:center; color:white;
  }

  .opacity-slider {
    position:absolute; right:14px; top:260px; z-index:10;
    height:180px; width:40px; display:flex; flex-direction:column; align-items:center;
    gap:8px;
  }
  .opacity-slider .track {
    flex:1; width:3px; border-radius:2px; background:rgba(255,255,255,.3); position:relative;
  }
  .opacity-slider .thumb-dot {
    position:absolute; left:50%; top:42%; transform:translate(-50%,-50%);
    width:18px; height:18px; border-radius:50%; background:white; box-shadow:0 2px 8px rgba(0,0,0,.4);
  }
  .opacity-slider .lbl { font-size:9px; opacity:.7; font-weight:700; }
</style>
</head>
<body class="fr-frame">
<div class="fr-page" style="position:relative;">
  <div class="cam">
    <div class="cam-view">
      <img src="https://images.unsplash.com/photo-1505144808419-1957a94ca61e?auto=format&fit=crop&w=800&q=80">
    </div>
    <div class="scene-overlay">
      <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=800&q=80">
    </div>
    <div class="grid-lines"></div>
    <div class="grid-v" style="position:absolute; inset:0; pointer-events:none;"></div>

    <div class="compare-hint">
      <div class="ring"><i data-lucide="target" class="ic-28"></i></div>
      <span style="font-size:11px; background:rgba(0,0,0,.55); padding:4px 10px; border-radius:999px;">김신 위치 맞추기</span>
    </div>
  </div>

  <div class="fr-status" style="position:absolute; top:0; left:0; right:0; color:white; z-index:11;">
    <span>9:41</span>
    <span class="right"><i data-lucide="signal" class="ic-16"></i><i data-lucide="wifi" class="ic-16"></i><i data-lucide="battery-full" class="ic-20"></i></span>
  </div>

  <div class="top">
    <button class="r-btn"><i data-lucide="x" class="ic-22"></i></button>
    <div class="spot-badge">
      <span class="dot"><i data-lucide="map-pin" class="ic-16"></i></span>
      <div>
        <div class="t">주문진 방파제</div>
        <div class="s">도깨비 · 1회</div>
      </div>
    </div>
    <button class="r-btn"><i data-lucide="zap" class="ic-22"></i></button>
  </div>

  <div class="guide-card">
    <div class="ico"><i data-lucide="sparkles" class="ic-18"></i></div>
    <div class="txt"><b>드라마 장면이 겹쳐있어요</b><br/><span style="opacity:.8">반투명 가이드에 맞춰서 찍어보세요</span></div>
  </div>

  <div class="opacity-slider">
    <span class="lbl">100</span>
    <div class="track"><div class="thumb-dot"></div></div>
    <span class="lbl">0</span>
  </div>

  <div class="modes">
    <span class="mode">비교</span>
    <span class="mode on">오버레이</span>
    <span class="mode">일반</span>
  </div>

  <div class="controls">
    <div class="thumb"><img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=200&q=80"></div>
    <button class="shutter"><div class="inner"></div></button>
    <div class="flip"><i data-lucide="refresh-cw" class="ic-22"></i></div>
  </div>
  <div class="fr-home-indicator" style="background:white; opacity:.6;"></div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
