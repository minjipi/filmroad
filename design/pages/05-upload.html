<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390">
<title>05 · 업로드</title>
<link rel="stylesheet" href="shared.css?v=7">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .top { padding: 8px 16px 12px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--fr-line); }
  .top h1 { font-size:17px; font-weight:800; letter-spacing:-0.02em; margin:0; }
  .top .cancel { color:var(--fr-ink-3); font-weight:600; font-size:14px; }
  .top .post { background:var(--fr-primary); color:white; font-weight:700; font-size:13px; padding:8px 14px; border-radius:999px; border:none; }

  .preview-wrap { padding:16px 16px 0; position:relative; }
  .preview { width:100%; aspect-ratio:4/5; border-radius:18px; overflow:hidden; background:#000; position:relative; }
  .preview img { width:100%; height:100%; object-fit:cover; }
  .frame-sticker {
    position:absolute; left:14px; bottom:14px;
    background: linear-gradient(135deg, rgba(20,188,237,.95), rgba(14,165,212,.95));
    color:white; padding:8px 12px; border-radius:12px;
    display:flex; align-items:center; gap:8px; backdrop-filter:blur(8px);
    box-shadow: 0 8px 20px rgba(20,188,237,.4);
  }
  .frame-sticker .ico { width:24px; height:24px; border-radius:7px; background:white; color:var(--fr-primary); display:flex; align-items:center; justify-content:center; }
  .frame-sticker .t { font-size:11.5px; font-weight:800; line-height:1.1; }
  .frame-sticker .s { font-size:9px; opacity:.9; line-height:1.1; }

  .thumbs { display:flex; gap:8px; padding: 12px 16px; overflow-x:auto; }
  .thumbs .t {
    width:60px; height:60px; border-radius:12px; flex-shrink:0; overflow:hidden; position:relative; border:2px solid transparent;
  }
  .thumbs .t.sel { border-color: var(--fr-primary); }
  .thumbs .t img { width:100%; height:100%; object-fit:cover; }
  .thumbs .plus { width:60px; height:60px; border-radius:12px; background:var(--fr-bg-muted); display:flex; align-items:center; justify-content:center; color:var(--fr-ink-3); border:1.5px dashed var(--fr-line); flex-shrink:0; }

  .fields { padding: 4px 16px 100px; }
  .field { padding: 16px 0; border-bottom: 1px solid var(--fr-line); }
  .caption { width:100%; border:none; font-size:14.5px; resize:none; outline:none; min-height:76px; font-family:inherit; letter-spacing:-0.01em; color:var(--fr-ink); }
  .caption::placeholder { color:var(--fr-ink-4); }
  .row-field { display:flex; align-items:center; gap:12px; }
  .row-field .ico { width:36px; height:36px; border-radius:10px; background:var(--fr-primary-soft); color:var(--fr-primary); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .row-field .k { font-size:12px; color:var(--fr-ink-3); }
  .row-field .v { font-size:14px; font-weight:700; letter-spacing:-0.02em; margin-top:1px; }
  .row-field .chev { color:var(--fr-ink-4); margin-left:auto; }

  .tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
  .tag { font-size:12px; color:var(--fr-primary); background:var(--fr-primary-soft); padding:5px 11px; border-radius:999px; font-weight:700; }
  .tag.gray { color:var(--fr-ink-2); background:var(--fr-bg-muted); }

  .toggle { width:42px; height:24px; background:var(--fr-primary); border-radius:999px; position:relative; }
  .toggle::after { content:''; position:absolute; right:3px; top:3px; width:18px; height:18px; border-radius:50%; background:white; }
  .toggle.off { background:#cbd5e1; }
  .toggle.off::after { left:3px; right:auto; }

  .sticker-label {
    position:absolute; top:14px; right:14px;
    background: rgba(0,0,0,.55); color:white;
    padding:6px 10px; border-radius:999px; font-size:10px; font-weight:700;
    display:flex; align-items:center; gap:5px;
    backdrop-filter: blur(8px);
  }
</style>
</head>
<body class="fr-frame">
<div class="fr-page">
  <div class="fr-status">
    <span>9:41</span>
    <span class="right"><i data-lucide="signal" class="ic-16"></i><i data-lucide="wifi" class="ic-16"></i><i data-lucide="battery-full" class="ic-20"></i></span>
  </div>

  <div class="top">
    <span class="cancel">취소</span>
    <h1>인증샷 올리기</h1>
    <button class="post">공유하기</button>
  </div>

  <div class="fr-scroll no-scrollbar">
    <div class="preview-wrap">
      <div class="preview">
        <img src="https://images.unsplash.com/photo-1520626337972-005d3cdb8978?auto=format&fit=crop&w=800&q=80">
        <div class="sticker-label"><i data-lucide="sparkles" class="ic-16"></i>장면 비교 ON</div>
        <div class="frame-sticker">
          <div class="ico"><i data-lucide="film" class="ic-18"></i></div>
          <div>
            <div class="t">도깨비 · 1회</div>
            <div class="s">주문진 영진해변 방파제</div>
          </div>
        </div>
      </div>
    </div>

    <div class="thumbs no-scrollbar">
      <div class="t sel"><img src="https://images.unsplash.com/photo-1520626337972-005d3cdb8978?auto=format&fit=crop&w=200&q=80"></div>
      <div class="t"><img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=200&q=80"></div>
      <div class="t"><img src="https://images.unsplash.com/photo-1541963463532-d68292c34b19?auto=format&fit=crop&w=200&q=80"></div>
      <div class="plus"><i data-lucide="plus" class="ic-22"></i></div>
    </div>

    <div class="fields">
      <div class="field">
        <textarea class="caption" placeholder="이 장면에 대한 이야기를 들려주세요...">진짜 김신이 나올 것 같은 날씨였어요 🌊 메밀꽃은 근처 편의점에서 3천원에 살 수 있음</textarea>
        <div class="tags">
          <span class="tag">#도깨비성지</span>
          <span class="tag">#주문진방파제</span>
          <span class="tag">#강릉여행</span>
          <span class="tag gray">+ 태그 추가</span>
        </div>
      </div>

      <div class="field row-field">
        <div class="ico"><i data-lucide="film" class="ic-20"></i></div>
        <div>
          <div class="k">작품</div>
          <div class="v">도깨비 · 1회 00:15:24</div>
        </div>
        <i data-lucide="chevron-right" class="ic-20 chev"></i>
      </div>

      <div class="field row-field">
        <div class="ico"><i data-lucide="map-pin" class="ic-20"></i></div>
        <div>
          <div class="k">위치</div>
          <div class="v">주문진 영진해변 방파제</div>
        </div>
        <i data-lucide="chevron-right" class="ic-20 chev"></i>
      </div>

      <div class="field row-field">
        <div class="ico"><i data-lucide="users" class="ic-20"></i></div>
        <div style="flex:1;">
          <div class="k">함께 간 사람</div>
          <div class="v">친구 태그하기</div>
        </div>
        <i data-lucide="chevron-right" class="ic-20 chev"></i>
      </div>

      <div class="field row-field">
        <div class="ico" style="background:#fff1f2; color:var(--fr-coral);"><i data-lucide="stamp" class="ic-20"></i></div>
        <div style="flex:1;">
          <div class="k">스탬프북에 추가</div>
          <div class="v">도깨비 · 12/24 수집</div>
        </div>
        <div class="toggle"></div>
      </div>

      <div class="field row-field">
        <div class="ico" style="background:#eff6ff; color:#2563eb;"><i data-lucide="globe" class="ic-20"></i></div>
        <div style="flex:1;">
          <div class="k">공개 범위</div>
          <div class="v">전체 공개</div>
        </div>
        <div class="toggle"></div>
      </div>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
