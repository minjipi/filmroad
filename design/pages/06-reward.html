<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390">
<title>06 · 인증 완료</title>
<link rel="stylesheet" href="shared.css?v=7">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .bg {
    position:absolute; inset:0; overflow:hidden;
    background:
      radial-gradient(circle at 20% 10%, rgba(20,188,237,.15), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(124,58,237,.1), transparent 40%),
      #fafbfd;
  }
  .confetti { position:absolute; width:8px; height:8px; border-radius:2px; }

  .page-content { position:relative; z-index:1; padding: 60px 24px 40px; display:flex; flex-direction:column; align-items:center; text-align:center; height:100%; overflow-y:auto; }

  .check-wrap { position:relative; width:120px; height:120px; margin: 30px 0 20px; }
  .check-ring { position:absolute; inset:0; border-radius:50%; background: var(--fr-primary); box-shadow: 0 20px 50px rgba(20,188,237,.45); display:flex; align-items:center; justify-content:center; color:white; }
  .check-ring::before { content:''; position:absolute; inset:-8px; border-radius:50%; border:2px solid rgba(20,188,237,.3); }

  h1.title { font-size:28px; font-weight:800; letter-spacing:-0.04em; margin: 8px 0 8px; }
  .sub { font-size:14px; color:var(--fr-ink-3); line-height:1.5; }
  .bold-k { color:var(--fr-primary); font-weight:800; }

  .stamp-card {
    margin-top: 26px; width:100%;
    background:white; border-radius:22px; padding: 20px 18px;
    border:1px solid var(--fr-line);
    position:relative;
  }
  .stamp-card::before, .stamp-card::after {
    content:''; position:absolute; width:16px; height:16px; border-radius:50%; background:#fafbfd; top:50%; transform:translateY(-50%);
    border:1px solid var(--fr-line);
  }
  .stamp-card::before { left:-8px; }
  .stamp-card::after { right:-8px; }
  .stamp-top { display:flex; align-items:center; gap:12px; text-align:left; margin-bottom: 14px; padding-bottom:14px; border-bottom: 1px dashed var(--fr-line); }
  .stamp-badge {
    width:56px; height:56px; border-radius:16px;
    background: linear-gradient(135deg, #14BCED, #7c3aed);
    display:flex; align-items:center; justify-content:center;
    color:white; position:relative;
  }
  .stamp-badge .num {
    position:absolute; right:-4px; top:-4px; width:20px; height:20px; border-radius:50%; background:var(--fr-coral); color:white; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; border:2px solid white;
  }
  .stamp-info { flex:1; }
  .stamp-info .t { font-size:16px; font-weight:800; letter-spacing:-0.02em; }
  .stamp-info .s { font-size:12px; color:var(--fr-ink-3); margin-top:2px; }

  .progress { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:12px; }
  .progress .p-t { font-weight:700; color:var(--fr-ink); }
  .progress .p-v { color:var(--fr-ink-3); }
  .bar { height:8px; background:var(--fr-bg-muted); border-radius:999px; overflow:hidden; }
  .bar .fill { height:100%; width:50%; border-radius:999px; background: linear-gradient(90deg, #14BCED, #7c3aed); }
  .next-milestone { font-size:11px; color:var(--fr-ink-3); margin-top:10px; text-align:left; }
  .next-milestone b { color:var(--fr-primary); font-weight:700; }

  .rewards { display:flex; gap:8px; width:100%; margin-top:20px; }
  .reward { flex:1; background:white; border:1px solid var(--fr-line); border-radius:16px; padding:14px 10px; text-align:center; }
  .reward .ico { width:36px; height:36px; border-radius:10px; margin: 0 auto 8px; display:flex; align-items:center; justify-content:center; }
  .reward .n { font-size:18px; font-weight:800; letter-spacing:-0.02em; }
  .reward .l { font-size:10.5px; color:var(--fr-ink-3); margin-top:1px; }

  .actions { margin-top:auto; padding-top:28px; width:100%; display:flex; flex-direction:column; gap:8px; }
  .link { color:var(--fr-ink-3); font-size:13px; font-weight:600; text-align:center; padding:10px; }
</style>
</head>
<body class="fr-frame">
<div class="fr-page" style="position:relative;">
  <div class="bg">
    <div class="confetti" style="background:#14BCED; left:10%; top:12%;"></div>
    <div class="confetti" style="background:#7c3aed; left:85%; top:18%; transform:rotate(20deg);"></div>
    <div class="confetti" style="background:#f5a524; left:20%; top:28%;"></div>
    <div class="confetti" style="background:#10b981; left:78%; top:40%; transform:rotate(-20deg);"></div>
    <div class="confetti" style="background:#14BCED; left:12%; top:55%;"></div>
    <div class="confetti" style="background:#ff5a5f; left:88%; top:60%;"></div>
  </div>

  <div class="fr-status" style="position:relative;">
    <span>9:41</span>
    <span class="right"><i data-lucide="signal" class="ic-16"></i><i data-lucide="wifi" class="ic-16"></i><i data-lucide="battery-full" class="ic-20"></i></span>
  </div>

  <div class="page-content no-scrollbar">
    <div class="check-wrap">
      <div class="check-ring"><i data-lucide="check" style="width:56px; height:56px; stroke-width:3;"></i></div>
    </div>

    <h1 class="title">인증 완료!</h1>
    <p class="sub"><span class="bold-k">'주문진 영진해변'</span> 성지를<br/>성공적으로 수집하셨어요 ✨</p>

    <div class="stamp-card">
      <div class="stamp-top">
        <div class="stamp-badge"><i data-lucide="film" class="ic-22"></i><span class="num">12</span></div>
        <div class="stamp-info">
          <div class="t">도깨비 스탬프북</div>
          <div class="s">12 / 24 성지 수집</div>
        </div>
      </div>
      <div class="progress"><span class="p-t">컬렉션 진행률</span><span class="p-v">50%</span></div>
      <div class="bar"><div class="fill"></div></div>
      <div class="next-milestone">다음 <b>6곳</b> 모으면 <b>‘저승사자’ 스페셜 뱃지</b> 획득!</div>
    </div>

    <div class="rewards">
      <div class="reward">
        <div class="ico" style="background:#fff7e6;"><i data-lucide="star" style="color:#f5a524; fill:#f5a524; width:20px; height:20px;"></i></div>
        <div class="n">+50</div><div class="l">성지 포인트</div>
      </div>
      <div class="reward">
        <div class="ico" style="background:#e6f8fd;"><i data-lucide="flame" style="color:#14BCED; width:20px; height:20px;"></i></div>
        <div class="n">7일</div><div class="l">연속 인증</div>
      </div>
      <div class="reward">
        <div class="ico" style="background:#ecfdf5;"><i data-lucide="trending-up" style="color:#10b981; width:20px; height:20px;"></i></div>
        <div class="n">LV.5</div><div class="l">성지 순례자</div>
      </div>
    </div>

    <div class="actions">
      <button class="fr-btn fr-btn-primary"><i data-lucide="share-2" class="ic-20"></i>친구에게 자랑하기</button>
      <button class="link">홈으로 돌아가기</button>
    </div>
  </div>
  <div class="fr-home-indicator"></div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
