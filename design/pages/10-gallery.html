<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390">
<title>10 · 갤러리</title>
<link rel="stylesheet" href="shared.css?v=7">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .top { padding: 8px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--fr-line); }
  .top h1 { font-size:16px; font-weight:800; letter-spacing:-0.02em; margin:0; flex:1; line-height:1.2; }
  .top h1 .s { display:block; font-size:11px; color:var(--fr-ink-3); font-weight:600; margin-top:1px; }
  .top button { width:36px; height:36px; border-radius:50%; background:transparent; border:none; color:var(--fr-ink-2); display:flex; align-items:center; justify-content:center; }

  .filter-row { display:flex; align-items:center; justify-content:space-between; padding: 12px 16px; }
  .chips { display:flex; gap:6px; overflow-x:auto; flex:1; margin-right:8px; }
  .ch { white-space:nowrap; padding:6px 11px; border-radius:999px; font-size:12px; font-weight:700; background:var(--fr-bg-muted); color:var(--fr-ink-2); }
  .ch.on { background:var(--fr-ink); color:white; }
  .view-toggle { display:flex; background:var(--fr-bg-muted); border-radius:10px; padding:2px; }
  .view-toggle .vi { width:30px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--fr-ink-3); }
  .view-toggle .vi.on { background:white; color:var(--fr-ink); box-shadow:0 2px 6px rgba(0,0,0,.06); }

  .gal-feed { padding: 0 0 100px; display:flex; flex-direction:column; gap:4px; }
  .post { background:white; }
  .post-head { display:flex; align-items:center; gap:10px; padding: 10px 16px; }
  .ava { width:34px; height:34px; border-radius:50%; overflow:hidden; background:#fce7f3; }
  .ava img { width:100%; height:100%; object-fit:cover; }
  .post-head .n { font-size:13px; font-weight:800; letter-spacing:-0.02em; display:flex; align-items:center; gap:4px; }
  .post-head .s { font-size:10.5px; color:var(--fr-ink-3); margin-top:1px; }
  .post-head .more { margin-left:auto; color:var(--fr-ink-4); }

  .post-img { position:relative; width:100%; aspect-ratio: 4/5; background:#000; }
  .post-img img { width:100%; height:100%; object-fit:cover; }
  .scene-marker {
    position:absolute; left:12px; bottom:12px;
    background:rgba(0,0,0,.55); backdrop-filter:blur(8px);
    color:white; padding:5px 10px 5px 5px; border-radius:999px;
    display:flex; align-items:center; gap:6px;
  }
  .scene-marker .d { width:20px; height:20px; border-radius:50%; background:var(--fr-primary); display:flex; align-items:center; justify-content:center; }
  .scene-marker .t { font-size:10.5px; font-weight:800; }

  .post-actions { display:flex; align-items:center; gap:14px; padding: 10px 16px 4px; }
  .post-actions .a { display:flex; align-items:center; gap:4px; font-size:12px; font-weight:700; color:var(--fr-ink-2); }
  .post-actions .a.liked { color:var(--fr-coral); }
  .post-actions .save-r { margin-left:auto; color:var(--fr-ink-2); }

  .caption { padding: 4px 16px 14px; font-size:12.5px; line-height:1.5; color:var(--fr-ink-2); letter-spacing:-0.01em; }
  .caption b { color:var(--fr-ink); }

  .grid-view { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; padding: 0 6px 100px; }
  .grid-view .gc { aspect-ratio:4/5; border-radius:12px; overflow:hidden; position:relative; }
  .grid-view .gc img { width:100%; height:100%; object-fit:cover; }
  .grid-view .gc .hl { position:absolute; top:8px; left:8px; background:rgba(0,0,0,.55); color:white; font-size:9px; font-weight:700; padding:3px 8px; border-radius:999px; backdrop-filter:blur(6px); }
  .grid-view .gc .hr { position:absolute; bottom:8px; left:8px; right:8px; display:flex; justify-content:space-between; color:white; font-size:10px; font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,.4); }
</style>
</head>
<body class="fr-frame">
<div class="fr-page">
  <div class="fr-status">
    <span>9:41</span>
    <span class="right"><i data-lucide="signal" class="ic-16"></i><i data-lucide="wifi" class="ic-16"></i><i data-lucide="battery-full" class="ic-20"></i></span>
  </div>

  <div class="top">
    <button><i data-lucide="chevron-left" class="ic-22"></i></button>
    <h1>주문진 방파제 인증샷<span class="s">3,247개 · 도깨비 1회</span></h1>
    <button><i data-lucide="map" class="ic-20"></i></button>
  </div>

  <div class="filter-row">
    <div class="chips no-scrollbar">
      <div class="ch on">전체</div>
      <div class="ch">인기순</div>
      <div class="ch">최신순</div>
      <div class="ch">친구만</div>
      <div class="ch">장면 비교</div>
    </div>
    <div class="view-toggle">
      <div class="vi on"><i data-lucide="rows-3" class="ic-16"></i></div>
      <div class="vi"><i data-lucide="grid-3x3" class="ic-16"></i></div>
    </div>
  </div>

  <div class="fr-scroll no-scrollbar">
    <div class="gal-feed">
      <article class="post">
        <div class="post-head">
          <div class="ava"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=100&q=80"></div>
          <div>
            <div class="n">@soyeon_film <i data-lucide="badge-check" style="width:14px; height:14px; color:var(--fr-primary); fill:var(--fr-primary-soft);"></i></div>
            <div class="s">3시간 전 · 일몰</div>
          </div>
          <i data-lucide="more-horizontal" class="ic-20 more"></i>
        </div>
        <div class="post-img">
          <img src="https://images.unsplash.com/photo-1520626337972-005d3cdb8978?auto=format&fit=crop&w=800&q=80">
          <div class="scene-marker"><span class="d"><i data-lucide="sparkles" class="ic-16" style="color:white"></i></span><span class="t">드라마 장면과 비교</span></div>
        </div>
        <div class="post-actions">
          <span class="a liked"><i data-lucide="heart" class="ic-20" style="fill:currentColor"></i>428</span>
          <span class="a"><i data-lucide="message-circle" class="ic-20"></i>23</span>
          <span class="a"><i data-lucide="share-2" class="ic-20"></i></span>
          <span class="save-r"><i data-lucide="bookmark" class="ic-20"></i></span>
        </div>
        <div class="caption"><b>@soyeon_film</b> 메밀꽃 한 다발 들고 기다렸어요 🌾 진짜 도깨비 나올 뻔...</div>
      </article>

      <article class="post">
        <div class="post-head">
          <div class="ava"><img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=100&q=80"></div>
          <div>
            <div class="n">@traveler.hj</div>
            <div class="s">어제 · 맑음</div>
          </div>
          <i data-lucide="more-horizontal" class="ic-20 more"></i>
        </div>
        <div class="post-img">
          <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=800&q=80">
          <div class="scene-marker"><span class="d"><i data-lucide="film" class="ic-16" style="color:white"></i></span><span class="t">1회 00:15:24</span></div>
        </div>
        <div class="post-actions">
          <span class="a"><i data-lucide="heart" class="ic-20"></i>312</span>
          <span class="a"><i data-lucide="message-circle" class="ic-20"></i>18</span>
          <span class="a"><i data-lucide="share-2" class="ic-20"></i></span>
          <span class="save-r"><i data-lucide="bookmark" class="ic-20"></i></span>
        </div>
        <div class="caption"><b>@traveler.hj</b> 골든아워에 가셔야 합니다. 진심.</div>
      </article>
    </div>
  </div>

  <nav class="fr-nav">
    <div class="fr-nav-row">
      <div class="fr-nav-item"><i data-lucide="home" class="ic-24"></i><span class="lbl">홈</span></div>
      <div class="fr-nav-item"><i data-lucide="map" class="ic-24"></i><span class="lbl">지도</span></div>
      <div class="fr-nav-cta"><i data-lucide="camera" class="ic-24"></i></div>
      <div class="fr-nav-item"><i data-lucide="search" class="ic-24"></i><span class="lbl">탐색</span></div>
      <div class="fr-nav-item"><i data-lucide="user" class="ic-24"></i><span class="lbl">나</span></div>
    </div>
  </nav>
  <div class="fr-home-indicator"></div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
