  /* Featured row (wide first row) */
  .featured-wrap { padding: 10px 20px 4px; }
  .featured {

  .featured img { width:100%; height:100%; object-fit:cover; }

  /* Grid */
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:2px; padding-bottom: 110px; }
  .cell { position:relative; aspect-ratio:1; overflow:hidden; cursor:pointer; }
  .cell img { width:100%; height:100%; object-fit:cover; transition: transform .2s; }
  .cell:hover img { transform: scale(1.04); }
  .cell .drama { position:absolute; left:5px; top:5px; font-size:9.5px; font-weight:800; color:white; background:rgba(0,0,0,.65); padding:3px 6px; border-radius:5px; backdrop-filter:blur(6px); letter-spacing:-0.01em; }
