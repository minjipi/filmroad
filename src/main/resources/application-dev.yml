spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID:disabled-kakao}
            client-secret: ${KAKAO_CLIENT_SECRET:disabled-kakao}
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/login/oauth2/code/kakao}
            scope: profile_nickname, profile_image
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ADDR}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: true
          auth: true
          timeout: 5000

  datasource:
    url: ${DB_URL}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      # 기본 never — 앱 기동 시 data.sql 을 자동 실행하지 않는다.
      # 데모 시드가 필요하면 환경변수 SQL_INIT_MODE=always 로 opt-in.
      mode: ${SQL_INIT_MODE:never}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.boot.autoconfigure.security: DEBUG
    org.springframework.http: DEBUG

jwt:
  secret:
    key: ${JWT_SECRET}

portone:
  portone_secret: ${PORTONE_SECRET}

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:disabled-kakao}
  local:
    base-url: https://dapi.kakao.com
    timeout-ms: 3000
    cache-ttl-hours: 24
    nearby-radius-meters: 500
  mobility:
    base-url: https://apis-navi.kakaomobility.com
    timeout-ms: 5000

app:
  domain:
    server: "http://localhost:5173"
    cookie: "localhost"
  aes:
    key: ${AES_SECRET_KEY:devAesSecretKey1234567890123456}
  token:
    access-max-age: 1800000
    refresh-max-age: 604800000
    # SameSite=Lax 는 같은 사이트 내비게이션엔 쿠키를 실어 보내지만 타사이트 POST 는
    # 차단해 CSRF 보호는 유지. Strict 로 두면 OAuth redirect callback(Google/Kakao → 우리 백엔드)
    # 에서 쿠키가 떨어져 세션이 끊기므로 Lax 사용.
    # 운영에서는 APP_TOKEN_ACCESS_FORMAT / APP_TOKEN_REFRESH_FORMAT 환경변수로
    # Domain=.yourdomain.com 등 실도메인 + Secure 를 덮어쓴다.
    #
    # dev 환경 주의 — 이전 포맷에 박혀 있던 `Secure` / `Domain=localhost` 두 개를
    # 제거. 두 속성이 같이 있으면 다음 두 케이스에서 브라우저가 Set-Cookie 를 통째로
    # drop:
    #   1) `Secure` — HTTP 위에서는 무시(Chrome 만 localhost 호스트 한정 예외, Firefox/
    #      Safari 는 그것도 미지원). 127.0.0.1 / WSL IP 로 접속하면 Chrome 도 거절.
    #   2) `Domain=localhost` — 응답 host(예: 172.30.1.10) 와 매칭되지 않으면 쿠키 저장
    #      자체가 안 됨.
    # 둘 다 빼면 브라우저가 응답 host 를 default Domain 으로 사용 → localhost 든 WSL IP
    # 든 동일하게 동작. HttpOnly / SameSite=Lax / Path 는 dev 에도 유지(보안 + CSRF 방어).
    access-format: "ATOKEN=%s; HttpOnly; SameSite=Lax; Path=/; Max-Age=%d"
    refresh-format: "RTOKEN=%s; HttpOnly; SameSite=Lax; Path=/; Max-Age=%d"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true
    mail:
      enabled: false
    diskspace:
      enabled: false
    ping:
      enabled: false
    ssl:
      enabled: false
project:
  upload:
    # dev 기본값: 프로젝트 루트의 ./uploads (재부팅/tmp-wipe 에도 유지, .gitignore 에 등재).
    # 운영은 UPLOAD_PATH 환경변수로 override (예: S3 마운트 볼륨 경로).
    path: ${UPLOAD_PATH:./uploads}
