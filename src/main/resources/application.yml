spring:
  profiles:
    active: dev
  servlet:
    multipart:
      # 개별 파일 10MB 상한 유지. 멀티 파일 업로드(최대 5장)까지 커버하도록 전체 요청 30MB.
      max-file-size: 10MB
      max-request-size: 30MB

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:disabled-kakao}
  local:
    base-url: https://dapi.kakao.com
    timeout-ms: 3000
    cache-ttl-hours: 24
    nearby-radius-meters: 500
  mobility:
    base-url: https://apis-navi.kakaomobility.com
    timeout-ms: 5000

korea-tourism:
  service-key: ${KOREA_TOURISM_KEY:disabled-korea-tourism}
  api:
    base-url: https://apis.data.go.kr
    timeout-ms: 3000
    num-of-rows: 10
    radius-meters: 5000

app:
  congestion:
    # 한국관광공사 혼잡도 예측 API 의 캐시 TTL (시간). 일별 예측이라 6시간이면 충분.
    ttl-hours: 6